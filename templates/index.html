<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MRI Tumor Detection</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 600px;
            margin-top: 50px;
        }
        .card {
            border-radius: 15px;
        }
        img {
            max-height: 400px;
            margin-top: 15px;
        }
        .btn {
            width: 100%;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="text-center mb-4">
        <h1 class="text-primary">MRI Tumor Detection System</h1>
        <p class="text-secondary">Upload an MRI image to detect tumor type.</p>
    </div>

    <div class="card shadow p-4">
        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label">Select MRI Image:</label>
                <input type="file" name="file" class="form-control" accept="image/*" required>
            </div>
            <button type="submit" class="btn btn-primary">Upload and Detect</button>
        </form>
    </div>

    {% if result %}
    <div class="card shadow mt-4 p-4 text-center">
        <h4 class="text-success">{{ result }}</h4>
        <p>Confidence: {{ confidence }}</p>
        <img src="{{ file_path }}" class="img-fluid rounded">
    </div>
    {% endif %}

</div>

</body>
</html>
